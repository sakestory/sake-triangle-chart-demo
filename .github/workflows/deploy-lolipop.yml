name: Deploy to Lolipop (/shindan) via SFTP

# main へ push されたら、診断サイトの本番ファイル(28個)だけを
# ロリポップの /shindan へ SFTP(SSH) でアップロードする（アップロードのみ・削除なし）。
# FTPS ではなく SFTP を使う理由：FTPアクセス制限(.ftpaccess)が有効なため
# FTP系は許可IP以外から操作不可。SSH経由なら制限を維持したままデプロイできる。
on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'cat_*.png'
  workflow_dispatch:   # 手動実行も可能（初回はこれで管理者が明示起動する想定）

# 多重デプロイ防止（同時に1本だけ）
concurrency:
  group: deploy-lolipop
  cancel-in-progress: false

permissions:
  contents: read   # 最小権限（リポジトリ書き込み不要）

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # ★ロリポップのSSHホーム直下にある Web公開エリア（=FTPで見えるルート）
      REMOTE_PARENT: web
      # ★その中の、shindan.sake-story.com が指すフォルダ
      REMOTE_DIR: shindan
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: 対象28ファイルだけを staging に集める
        run: |
          set -euo pipefail
          mkdir -p deploy
          cp index.html deploy/
          for n in $(seq -w 1 27); do
            cp "cat_${n}.png" deploy/
          done
          echo "----- staged files -----"
          find deploy -type f -printf '%f\n' | sort
          count=$(find deploy -type f | wc -l | tr -d ' ')
          echo "staged count: ${count}"
          test "${count}" -eq 28   # 28個ちょうどでなければ失敗させる

      - name: lftp を導入
        run: sudo apt-get update && sudo apt-get install -y lftp

      # SFTP(SSH)方式：ロリポップの「FTPアクセス制限」(.ftpaccess)の影響を受けない。
      # .ftpaccess は無傷のまま＝wp等のFTP保護を維持しつつデプロイできる。
      - name: SFTP でアップロード（アップロードのみ・削除しない）
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SSH_HOST:?SSH_HOST secret が未設定です}"
          : "${SSH_PORT:?SSH_PORT secret が未設定です}"
          : "${SSH_USERNAME:?SSH_USERNAME secret が未設定です}"
          : "${SSH_PASSWORD:?SSH_PASSWORD secret が未設定です}"
          # コマンドは stdin(heredoc) で渡し、パスワードを argv やログに残さない。
          # set -x はしない。GitHub Actions は secret 値をログ上で自動マスクする。
          lftp <<LFTP
          set cmd:fail-exit true
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 25
          open -u "${SSH_USERNAME}","${SSH_PASSWORD}" "sftp://${SSH_HOST}:${SSH_PORT}"
          # Web公開エリア(web/)に移動。無ければここで失敗させる＝誤った場所への
          # サイレントアップロードを防ぐ安全弁。
          cd "${REMOTE_PARENT}"
          # 公開フォルダが未作成なら作る（既にあればエラーになるが無視して続行）
          set cmd:fail-exit false
          mkdir "${REMOTE_DIR}"
          set cmd:fail-exit true
          # --reverse=アップロード / --delete は付けない（対象外ファイルを消さない）
          mirror --reverse --verbose --no-perms --no-symlinks deploy "${REMOTE_DIR}"
          bye
          LFTP

      - name: 公開URLの応答を確認（情報表示のみ・失敗しても続行）
        continue-on-error: true
        run: |
          set -uo pipefail
          echo "HTTP status:"
          curl -s -o /dev/null -w "%{http_code}\n" https://shindan.sake-story.com/ || true
          echo "----- 冒頭を確認 -----"
          curl -s https://shindan.sake-story.com/ | grep -o "三角チャート" | head -1 || echo "(文字列検出できず: 反映待ち/キャッシュの可能性)"
