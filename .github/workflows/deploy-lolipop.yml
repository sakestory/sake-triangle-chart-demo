name: Deploy to Lolipop (/shindan) via FTPS

# main へ push されたら、診断サイトの本番ファイル(28個)だけを
# ロリポップの /shindan へ FTPS でアップロードする（アップロードのみ・削除なし）。
on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'cat_*.png'
  workflow_dispatch:   # 手動実行も可能（初回はこれで管理者が明示起動する想定）

# 多重デプロイ防止（同時に1本だけ）
concurrency:
  group: deploy-lolipop
  cancel-in-progress: false

permissions:
  contents: read   # 最小権限（リポジトリ書き込み不要）

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # ★ロリポップ側の公開ディレクトリ。shindan.sake-story.com が指すフォルダ。
      REMOTE_DIR: /shindan
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: 対象28ファイルだけを staging に集める
        run: |
          set -euo pipefail
          mkdir -p deploy
          cp index.html deploy/
          for n in $(seq -w 1 27); do
            cp "cat_${n}.png" deploy/
          done
          echo "----- staged files -----"
          find deploy -type f -printf '%f\n' | sort
          count=$(find deploy -type f | wc -l | tr -d ' ')
          echo "staged count: ${count}"
          test "${count}" -eq 28   # 28個ちょうどでなければ失敗させる

      - name: lftp を導入
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: FTPS でアップロード（アップロードのみ・削除しない）
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          : "${FTP_SERVER:?FTP_SERVER secret が未設定です}"
          : "${FTP_USERNAME:?FTP_USERNAME secret が未設定です}"
          : "${FTP_PASSWORD:?FTP_PASSWORD secret が未設定です}"
          # コマンドは stdin(heredoc) で渡し、パスワードを argv やログに残さない。
          # set -x はしない。GitHub Actions は secret 値をログ上で自動マスクする。
          lftp <<LFTP
          set cmd:fail-exit true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          # 証明書検証：no=接続の身元を検証しない（共有ホスティングで一般的／確実に動く）。
          # yes に変えると FTP認証情報を中間者攻撃から守れる。初回成功後に yes へ切替推奨。
          set ssl:verify-certificate no
          set net:max-retries 2
          set net:timeout 25
          open -u "${FTP_USERNAME}","${FTP_PASSWORD}" "ftp://${FTP_SERVER}"
          # 公開フォルダが未作成なら作る（既にあればエラーになるが無視して続行）
          set cmd:fail-exit false
          mkdir -p "${REMOTE_DIR}"
          set cmd:fail-exit true
          # --reverse=アップロード / --delete は付けない（対象外ファイルを消さない）
          mirror --reverse --verbose --no-perms --no-symlinks deploy "${REMOTE_DIR}"
          bye
          LFTP

      - name: 公開URLの応答を確認（情報表示のみ・失敗しても続行）
        continue-on-error: true
        run: |
          set -uo pipefail
          echo "HTTP status:"
          curl -s -o /dev/null -w "%{http_code}\n" https://shindan.sake-story.com/ || true
          echo "----- 冒頭を確認 -----"
          curl -s https://shindan.sake-story.com/ | grep -o "三角チャート" | head -1 || echo "(文字列検出できず: 反映待ち/キャッシュの可能性)"
